<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catchem</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0e1014;
        --panel: #161a22;
        --border: rgba(255, 255, 255, 0.06);
        --fg: #e7ebf0;
        --muted: #9aa3b2;
        --accent: #5fb3ff;
        --ok: #4ade80;
        --warn: #fbbf24;
        --err: #f87171;
      }
      html, body { margin: 0; height: 100%; background: var(--bg); color: var(--fg);
                   font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", sans-serif;
                   font-size: 13px; -webkit-font-smoothing: antialiased; }
      main { display: flex; flex-direction: column; align-items: center; justify-content: center;
             height: 100%; gap: 22px; padding: 24px; box-sizing: border-box; }
      .logo { font-size: 28px; font-weight: 700; letter-spacing: 0.4px; }
      .tag { font-size: 11px; color: var(--muted); margin-top: -14px; letter-spacing: 0.3px; }
      .panel { width: min(440px, 100%); background: var(--panel); border: 1px solid var(--border);
               border-radius: 10px; padding: 16px 18px; }
      .row { display: flex; align-items: center; gap: 10px; padding: 5px 0; font-size: 12px;
             color: var(--muted); }
      .row.done { color: var(--fg); }
      .row.active { color: var(--fg); }
      .ico { width: 14px; height: 14px; flex-shrink: 0; display: inline-flex;
             align-items: center; justify-content: center; }
      .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.18); }
      .row.done .dot { background: var(--ok); box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.18); }
      .row.active .dot { background: var(--warn); box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.18);
             animation: pulse 1.4s ease-in-out infinite; }
      .row.fail .dot { background: var(--err); box-shadow: 0 0 0 3px rgba(248, 113, 113, 0.18); }
      .meta { font-size: 11px; color: var(--muted); text-align: center; max-width: 440px;
              line-height: 1.6; }
      .actions { display: none; gap: 8px; flex-wrap: wrap; justify-content: center; }
      .actions.show { display: flex; }
      .btn { background: var(--accent); color: #0b1018; padding: 6px 14px; border: 0;
             border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: 600; }
      .btn.alt { background: transparent; color: var(--fg); border: 1px solid var(--border); }
      .err { color: var(--err); font-size: 12px; max-width: 480px; text-align: center;
             line-height: 1.5; }
      code { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
             font-size: 11px; background: rgba(255,255,255,0.04); padding: 1px 5px; border-radius: 3px; }
      @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    </style>
  </head>
  <body>
    <main id="root">
      <div>
        <div class="logo">Catchem</div>
        <div class="tag">local-first news → finance impact</div>
      </div>
      <div class="panel" id="stages" aria-live="polite">
        <div class="row" data-stage="boot">     <span class="ico"><span class="dot"></span></span> Checking sidecar binary</div>
        <div class="row" data-stage="spawn">    <span class="ico"><span class="dot"></span></span> Launching sidecar process</div>
        <div class="row" data-stage="health">   <span class="ico"><span class="dot"></span></span> Waiting for /healthz</div>
        <div class="row" data-stage="bundle">   <span class="ico"><span class="dot"></span></span> Bundle ready</div>
        <div class="row" data-stage="ready">    <span class="ico"><span class="dot"></span></span> App ready</div>
      </div>
      <div class="meta" id="meta">Sidecar typically answers in &lt;2 s on a warm boot.</div>
      <div class="actions" id="actions">
        <button class="btn" id="retry">Retry</button>
        <button class="btn alt" id="logs">Show log path</button>
      </div>
      <div class="err" id="err" hidden></div>
    </main>
    <script type="module">
      // Drive the boot-state UI by polling /healthz. Five visible stages mirror
      // the prompt's startup spec: checking → spawning → waiting → bundle → ready.
      // Once /healthz is 200, we hand the window to the FastAPI-served React UI;
      // the Rust shell's on_navigation guard allows http://127.0.0.1:8087/* and
      // rejects everything else.
      const endpoint = "http://127.0.0.1:8087";
      const DEADLINE_MS = 30_000;
      const POLL_MS = 350;

      const stages = ["boot", "spawn", "health", "bundle", "ready"];
      const el = (s) => document.querySelector(`[data-stage="${s}"]`);

      function setStage(name, status) {
        for (const s of stages) {
          const row = el(s);
          if (!row) continue;
          row.classList.remove("active", "done", "fail");
        }
        const idx = stages.indexOf(name);
        if (idx < 0) return;
        for (let i = 0; i < idx; i++) el(stages[i]).classList.add("done");
        if (status === "fail") el(name).classList.add("fail");
        else if (status === "done") {
          el(name).classList.add("done");
          for (let i = idx + 1; i < stages.length; i++) el(stages[i]).classList.add("done");
        } else el(name).classList.add("active");
      }

      // Safe DOM helpers — no innerHTML, no untrusted HTML strings reach the DOM.
      function clearChildren(node) { while (node.firstChild) node.removeChild(node.firstChild); }
      function appendText(node, t) { node.appendChild(document.createTextNode(t)); }
      function appendCode(node, t) {
        const c = document.createElement("code");
        c.textContent = t;
        node.appendChild(c);
      }

      function showTimeout(reason) {
        setStage("health", "fail");
        const meta = document.getElementById("meta");
        clearChildren(meta);
        appendText(meta, "Sidecar didn't answer at ");
        appendCode(meta, endpoint + "/healthz");
        appendText(meta, " within " + Math.round(DEADLINE_MS / 1000) + " s.");
        const err = document.getElementById("err");
        err.hidden = false;
        err.textContent = reason ? "Last error: " + reason : "";
        document.getElementById("actions").classList.add("show");
      }

      function showLogPath() {
        const meta = document.getElementById("meta");
        clearChildren(meta);
        appendText(meta, "Logs live at ");
        appendCode(meta, "~/Library/Logs/Catchem/sidecar.log");
        appendText(meta, ". Open ");
        appendCode(meta, "Console.app");
        appendText(meta, " and filter for ");
        appendCode(meta, "Catchem");
        appendText(meta, ", or run ");
        appendCode(meta, "open ~/Library/Logs/Catchem/");
        appendText(meta, " in Terminal.");
      }

      async function poll() {
        setStage("boot", "done");
        setStage("spawn", "active");
        // Rust spawns the process synchronously in setup() — by the time the
        // boot shim renders, the spawn phase is effectively over. Show the
        // spawn row briefly so users see the state machine progressing, then
        // move to the actual /healthz wait.
        await new Promise((r) => setTimeout(r, 250));
        setStage("health", "active");

        const deadline = Date.now() + DEADLINE_MS;
        let lastErr = "";
        while (Date.now() < deadline) {
          try {
            const r = await fetch(endpoint + "/healthz", { cache: "no-store" });
            if (r.ok) {
              setStage("bundle", "active");
              await new Promise((res) => setTimeout(res, 120));
              setStage("ready", "done");
              window.location.replace(endpoint + "/");
              return;
            }
            lastErr = "HTTP " + r.status;
          } catch (e) { lastErr = (e && e.message) || String(e); }
          await new Promise((r) => setTimeout(r, POLL_MS));
        }
        showTimeout(lastErr);
      }

      document.getElementById("retry").addEventListener("click", () => window.location.reload());
      document.getElementById("logs").addEventListener("click", showLogPath);
      poll();
    </script>
  </body>
</html>
