<main id="root">
  <div>
    <div class="logo">Catchem</div>
    <div class="tag">local-first news → finance impact</div>
  </div>
  <div class="panel" id="stages" aria-live="polite">
    <div class="row" data-stage="boot"><span class="ico"><span class="dot"></span></span> Checking sidecar binary</div>
    <div class="row" data-stage="spawn"><span class="ico"><span class="dot"></span></span> Launching sidecar process</div>
    <div class="row" data-stage="health"><span class="ico"><span class="dot"></span></span> Waiting for /healthz</div>
    <div class="row" data-stage="bundle"><span class="ico"><span class="dot"></span></span> Bundle ready</div>
    <div class="row" data-stage="ready"><span class="ico"><span class="dot"></span></span> App ready</div>
  </div>
  <div class="meta" id="meta">Sidecar typically answers in &lt;2 s on a warm boot.</div>
  <div class="actions" id="actions">
    <button class="btn" id="retry">Retry</button>
    <button class="btn alt" id="logs">Show log path</button>
  </div>
  <div class="err" id="err" hidden></div>
</main>
