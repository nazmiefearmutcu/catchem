<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catchem</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; background: #0e1014; color: #e7ebf0;
                   font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", sans-serif;
                   font-size: 13px; }
      main { display: flex; flex-direction: column; align-items: center; justify-content: center;
             height: 100%; gap: 18px; }
      .logo { font-size: 28px; font-weight: 700; letter-spacing: 0.5px; }
      .sub { font-size: 12px; color: #9aa3b2; max-width: 420px; text-align: center; line-height: 1.6; }
      .dot { width: 10px; height: 10px; border-radius: 50%; background: #fbbf24;
             box-shadow: 0 0 0 4px rgba(251, 191, 36, 0.18); animation: pulse 1.4s ease-in-out infinite; }
      .err { color: #f87171; font-size: 12px; max-width: 480px; text-align: center; line-height: 1.5; }
      .btn { background: #5fb3ff; color: #0b1018; padding: 6px 14px; border: 0; border-radius: 6px;
             font-size: 12px; cursor: pointer; margin-top: 8px; }
      @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    </style>
  </head>
  <body>
    <main id="root">
      <div class="logo">Catchem</div>
      <div class="dot" id="dot" aria-hidden="true"></div>
      <div class="sub" id="status">Starting local sidecar…</div>
    </main>
    <script type="module">
      // Wait for the sidecar /healthz, then redirect to the React UI.
      const endpoint = "http://127.0.0.1:8087";
      const statusEl = document.getElementById("status");
      const dotEl = document.getElementById("dot");

      function showTimeout() {
        statusEl.replaceChildren();
        dotEl.style.background = "#f87171";
        dotEl.style.boxShadow = "0 0 0 4px rgba(248, 113, 113, 0.18)";
        const err = document.createElement("div");
        err.className = "err";
        err.textContent = "Sidecar didn't respond on " + endpoint + "/healthz within 30 seconds.";
        statusEl.appendChild(err);
        const btn = document.createElement("button");
        btn.className = "btn";
        btn.textContent = "Retry";
        btn.onclick = () => window.location.reload();
        statusEl.appendChild(btn);
      }

      async function poll() {
        const deadline = Date.now() + 30_000;
        while (Date.now() < deadline) {
          try {
            const r = await fetch(endpoint + "/healthz", { cache: "no-store" });
            if (r.ok) {
              statusEl.textContent = "Ready";
              dotEl.style.background = "#4ade80";
              dotEl.style.boxShadow = "0 0 0 4px rgba(74, 222, 128, 0.18)";
              window.location.replace(endpoint + "/");
              return;
            }
          } catch (_e) { /* keep polling */ }
          await new Promise((r) => setTimeout(r, 400));
        }
        showTimeout();
      }
      poll();
    </script>
  </body>
</html>
