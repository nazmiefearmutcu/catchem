# fusion_stack main configuration. Env vars (prefix FUSION_) and .env override these.
# The settings module merges this file last so YAML is the lowest-priority layer.

mode: production_safe                # production_safe | replay_existing | live_tail | research_diagnostic

paths:
  awareness_repo: "/Users/nazmi/Desktop/Projeler/proje/awareness"
  newsimpact_repo: "/Users/nazmi/Desktop/Projeler/proje/merged_news"
  awareness_data_dir: "/Users/nazmi/Desktop/Projeler/proje/awareness/data"
  fusion_output_dir: "/Users/nazmi/Desktop/Projeler/proje/fusion_stack/data"

models:
  sentiment_default: "ProsusAI/finbert"
  sentiment_alternates:
    - "yiyanghkust/finbert-tone"
    - "mrm8488/distilroberta-finetuned-financial-news-sentiment-analysis"
  zero_shot: "facebook/bart-large-mnli"
  embedding: "sentence-transformers/all-MiniLM-L6-v2"
  reranker: "cross-encoder/ms-marco-MiniLM-L6-v2"
  use_ml_stubs: true   # CPU-friendly deterministic stubs; bootstrap flips this if --with-ml.

guards:
  newsimpact_diagnostic_enabled: false
  allow_research_diagnostic_in_modes:
    - research_diagnostic
  abort_if_governance_state_changed: true

replay:
  batch_size: 32
  awareness_jsonl_glob: "data/jsonl/captures/**/*.jsonl"
  text_excerpt_chars: 2000
  offset_persist_seconds: 5

live:
  poll_seconds: 10.0
  tail_max_per_tick: 50
  awareness_api_url: "http://127.0.0.1:8085"

api:
  host: "127.0.0.1"
  port: 8087
  cors_origins: ["http://127.0.0.1:8087", "http://localhost:8087"]
  recent_limit_default: 50
  recent_limit_max: 500

storage:
  sqlite_url: "sqlite:///data/db/fusion.sqlite3"
  parquet_results_dir: "data/results"
  dlq_dir: "data/results/dlq"
  vector_index_dir: "data/vector_index"
  rotate_parquet_records: 5000

logging:
  level: INFO
  json: true
  file: "data/logs/fusion_stack.log"

thresholds:
  finance_relevance_floor: 0.35
  asset_class_min: 0.25
  reason_code_min: 0.25
  evidence_top_k: 3

kaggle:
  enable_downloads: false   # bootstrap may flip to true if creds present
  datasets:
    - "ankurzing/sentiment-analysis-for-financial-news"
    - "aaron7sun/stocknews"
    - "borismarjanovic/price-volume-data-for-all-us-stocks-etfs"
    - "equinxx/stock-tweets-for-sentiment-analysis-and-prediction"
