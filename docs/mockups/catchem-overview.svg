<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 820" font-family="-apple-system, 'SF Pro Text', 'Inter', sans-serif">
  <!-- Catchem Overview mockup. Layout matches frontend/src/features/overview/. -->
  <!-- Color palette mirrors desktop/catchem/web/index.html boot shim tokens. -->

  <!-- Background -->
  <rect width="1280" height="820" fill="#0e1014"/>

  <!-- ─── Top bar ──────────────────────────────────────────────────────── -->
  <rect x="0" y="0" width="1280" height="56" fill="#161a22"/>
  <line x1="0" y1="56" x2="1280" y2="56" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="24" y="35" fill="#e7ebf0" font-size="14" font-weight="700">fusion_stack</text>
  <text x="124" y="35" fill="#9aa3b2" font-size="10">analyst workstation</text>

  <!-- Nav links -->
  <g font-size="11">
    <rect x="220" y="20" width="68" height="22" rx="5" fill="rgba(95,179,255,0.12)"/>
    <text x="254" y="35" fill="#e7ebf0" text-anchor="middle">Overview</text>
    <text x="312" y="35" fill="#9aa3b2">Live Feed</text>
    <text x="374" y="35" fill="#9aa3b2">Analyze</text>
    <text x="434" y="35" fill="#9aa3b2">Analysis</text>
    <text x="500" y="35" fill="#9aa3b2">Symbols</text>
    <text x="562" y="35" fill="#9aa3b2">Benchmark</text>
    <text x="635" y="35" fill="#9aa3b2">Model Controls</text>
    <text x="725" y="35" fill="#9aa3b2">Ops</text>
    <text x="762" y="35" fill="#9aa3b2">Settings</text>
    <text x="816" y="35" fill="#9aa3b2">Help</text>
  </g>

  <!-- Live dot + summary + theme toggle + ⌘K -->
  <g>
    <circle cx="1062" cy="32" r="5" fill="#4ade80"/>
    <text x="1074" y="35" fill="#9aa3b2" font-size="10">live</text>
    <text x="1110" y="35" fill="#9aa3b2" font-size="10">128/214 relevant</text>
    <text x="1208" y="35" fill="#e7ebf0" font-size="13">☼</text>
    <rect x="1224" y="20" width="34" height="22" rx="4" fill="#161a22" stroke="rgba(255,255,255,0.1)"/>
    <text x="1241" y="35" fill="#9aa3b2" font-size="10" text-anchor="middle">⌘K</text>
  </g>

  <!-- Status banner -->
  <rect x="24" y="72" width="1232" height="36" rx="6" fill="rgba(74,222,128,0.08)" stroke="rgba(74,222,128,0.18)"/>
  <circle cx="44" cy="90" r="4" fill="#4ade80"/>
  <text x="58" y="94" fill="#e7ebf0" font-size="11" font-weight="600">production_safe</text>
  <text x="160" y="94" fill="#9aa3b2" font-size="11">· stubs on</text>
  <text x="225" y="94" fill="#9aa3b2" font-size="11">· release_gate_passed=false (quarantined)</text>
  <text x="475" y="94" fill="#9aa3b2" font-size="11">· safe_to_publish=true</text>

  <!-- ─── KPI cards (row 1) ──────────────────────────────────────────────── -->
  <g font-size="11">
    <!-- Card 1: Total records -->
    <rect x="24" y="124" width="296" height="98" rx="8" fill="#161a22" stroke="rgba(255,255,255,0.06)"/>
    <text x="40" y="148" fill="#9aa3b2" font-size="10">RECORDS · last 24 h</text>
    <text x="40" y="186" fill="#e7ebf0" font-size="32" font-weight="700">214</text>
    <text x="40" y="208" fill="#4ade80" font-size="10">+12 since 00:00</text>

    <!-- Card 2: Finance relevant -->
    <rect x="336" y="124" width="296" height="98" rx="8" fill="#161a22" stroke="rgba(255,255,255,0.06)"/>
    <text x="352" y="148" fill="#9aa3b2" font-size="10">FINANCE RELEVANT</text>
    <text x="352" y="186" fill="#e7ebf0" font-size="32" font-weight="700">128</text>
    <text x="442" y="186" fill="#9aa3b2" font-size="14">/214</text>
    <text x="352" y="208" fill="#9aa3b2" font-size="10">59.8% relevance rate</text>

    <!-- Card 3: Avg latency -->
    <rect x="648" y="124" width="296" height="98" rx="8" fill="#161a22" stroke="rgba(255,255,255,0.06)"/>
    <text x="664" y="148" fill="#9aa3b2" font-size="10">PUBLISHER LAG · median</text>
    <text x="664" y="186" fill="#e7ebf0" font-size="32" font-weight="700">11<tspan font-size="14" fill="#9aa3b2"> min</tspan></text>
    <text x="664" y="208" fill="#9aa3b2" font-size="10">RSS-side; pipeline adds &lt;100 ms</text>

    <!-- Card 4: DLQ -->
    <rect x="960" y="124" width="296" height="98" rx="8" fill="#161a22" stroke="rgba(255,255,255,0.06)"/>
    <text x="976" y="148" fill="#9aa3b2" font-size="10">DLQ</text>
    <text x="976" y="186" fill="#e7ebf0" font-size="32" font-weight="700">0</text>
    <text x="976" y="208" fill="#9aa3b2" font-size="10">no failed captures</text>
  </g>

  <!-- ─── Analyze-now CTA ────────────────────────────────────────────────── -->
  <rect x="24" y="238" width="1232" height="72" rx="8" fill="#161a22" stroke="rgba(95,179,255,0.32)"/>
  <text x="44" y="262" fill="#e7ebf0" font-size="13" font-weight="600">Analyze a new article</text>
  <text x="44" y="282" fill="#9aa3b2" font-size="11">Paste an article, drop a .txt/.md file, or pick one of the bundled samples (Fed, Nvidia, OPEC+, non-finance, holiday).</text>
  <rect x="1086" y="260" width="150" height="32" rx="6" fill="#5fb3ff"/>
  <text x="1161" y="280" fill="#0b1018" font-size="12" font-weight="600" text-anchor="middle">Open Analyze →</text>

  <!-- ─── Charts row ────────────────────────────────────────────────────── -->
  <g>
    <!-- Relevance trend -->
    <rect x="24" y="326" width="616" height="290" rx="8" fill="#161a22" stroke="rgba(255,255,255,0.06)"/>
    <text x="40" y="350" fill="#9aa3b2" font-size="10">RELEVANCE TREND · last 24 h, hourly</text>
    <!-- area chart sketch -->
    <polyline points="40,560 80,540 120,510 160,520 200,480 240,440 280,420 320,400 360,380 400,360 440,340 480,355 520,330 560,310 600,290 624,300"
              fill="none" stroke="#5fb3ff" stroke-width="2"/>
    <polyline points="40,560 80,540 120,510 160,520 200,480 240,440 280,420 320,400 360,380 400,360 440,340 480,355 520,330 560,310 600,290 624,300 624,592 40,592"
              fill="rgba(95,179,255,0.12)" stroke="none"/>
    <line x1="40" y1="592" x2="624" y2="592" stroke="rgba(255,255,255,0.1)"/>
    <text x="40" y="608" fill="#9aa3b2" font-size="9">00:00</text>
    <text x="333" y="608" fill="#9aa3b2" font-size="9">12:00</text>
    <text x="610" y="608" fill="#9aa3b2" font-size="9">now</text>

    <!-- Reason distribution -->
    <rect x="656" y="326" width="600" height="290" rx="8" fill="#161a22" stroke="rgba(255,255,255,0.06)"/>
    <text x="672" y="350" fill="#9aa3b2" font-size="10">TOP REASON CODES</text>
    <!-- bar list -->
    <g font-size="11">
      <text x="672" y="380" fill="#e7ebf0">central_bank</text>
      <rect x="800" y="370" width="200" height="14" rx="3" fill="#5fb3ff"/>
      <text x="1006" y="382" fill="#9aa3b2">38</text>

      <text x="672" y="410" fill="#e7ebf0">earnings</text>
      <rect x="800" y="400" width="168" height="14" rx="3" fill="#5fb3ff" opacity="0.85"/>
      <text x="974" y="412" fill="#9aa3b2">31</text>

      <text x="672" y="440" fill="#e7ebf0">supply_demand</text>
      <rect x="800" y="430" width="120" height="14" rx="3" fill="#5fb3ff" opacity="0.7"/>
      <text x="926" y="442" fill="#9aa3b2">22</text>

      <text x="672" y="470" fill="#e7ebf0">geopolitics</text>
      <rect x="800" y="460" width="84" height="14" rx="3" fill="#5fb3ff" opacity="0.55"/>
      <text x="890" y="472" fill="#9aa3b2">14</text>

      <text x="672" y="500" fill="#e7ebf0">guidance</text>
      <rect x="800" y="490" width="60" height="14" rx="3" fill="#5fb3ff" opacity="0.4"/>
      <text x="866" y="502" fill="#9aa3b2">9</text>

      <text x="672" y="530" fill="#e7ebf0">inflation</text>
      <rect x="800" y="520" width="48" height="14" rx="3" fill="#5fb3ff" opacity="0.32"/>
      <text x="854" y="532" fill="#9aa3b2">7</text>

      <text x="672" y="560" fill="#e7ebf0">litigation</text>
      <rect x="800" y="550" width="22" height="14" rx="3" fill="#5fb3ff" opacity="0.22"/>
      <text x="828" y="562" fill="#9aa3b2">3</text>
    </g>
  </g>

  <!-- ─── Recent flow ───────────────────────────────────────────────────── -->
  <rect x="24" y="632" width="1232" height="148" rx="8" fill="#161a22" stroke="rgba(255,255,255,0.06)"/>
  <text x="40" y="656" fill="#9aa3b2" font-size="10">RECENT CAPTURES</text>
  <g font-size="11">
    <text x="40" y="682" fill="#e7ebf0">Fed raises rates by 25 bps · central_bank · rates,macro · <tspan fill="#4ade80">0.91</tspan> · 2 min ago</text>
    <text x="40" y="702" fill="#e7ebf0">Nvidia Q4 earnings beat; raises Q1 outlook · earnings · equity · <tspan fill="#4ade80">0.88</tspan> · 9 min ago</text>
    <text x="40" y="722" fill="#e7ebf0">OPEC+ extends 2.2 mbpd voluntary cuts through Q2 · supply_demand · commodities,energy · <tspan fill="#4ade80">0.84</tspan> · 18 min ago</text>
    <text x="40" y="742" fill="#9aa3b2">Borneo conservationists release rehabilitated orangutans · <tspan fill="#fbbf24">non-finance</tspan> · 31 min ago</text>
    <text x="40" y="762" fill="#9aa3b2">U.S. markets closed for federal holiday; light European session · macro · <tspan fill="#fbbf24">0.34 low</tspan> · 1h ago</text>
  </g>

  <!-- Footer hint -->
  <text x="640" y="804" fill="#9aa3b2" font-size="9" text-anchor="middle">local-first · sidecar to Awareness · NewsImpact stays quarantined / read-only</text>
</svg>
